openapi: 3.1.0
info:
  title: Verifolio API
  description: "Verifolio backend API. Trust model: verification signals, not binary\
    \ verified flags."
  version: v1
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/v1/auth/sessions:
    post:
      tags:
      - auth-controller
      operationId: createSession
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
  /api/v1/auth/magic-links:
    post:
      tags:
      - auth-controller
      operationId: requestMagicLink
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagicLinkRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MessageResponse"
  /docs:
    get:
      tags:
      - api-docs-ui-controller
      operationId: scalarUi
      responses:
        "200":
          description: OK
          content:
            text/html:
              schema:
                type: string
  /api/v1/auth/sessions/current:
    get:
      tags:
      - auth-controller
      operationId: currentSession
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
    delete:
      tags:
      - auth-controller
      operationId: logout
      parameters:
      - name: verifolio_session
        in: cookie
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
components:
  schemas:
    SessionRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 1
      required:
      - token
    CurrentUserResponse:
      type: object
      properties:
        userId:
          type: string
        email:
          type: string
        region:
          type: string
      required:
      - email
      - region
      - userId
    MagicLinkRequest:
      type: object
      properties:
        email:
          type: string
          minLength: 1
      required:
      - email
    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
