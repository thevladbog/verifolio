openapi: 3.1.0
info:
  title: Verifolio API
  description: "Verifolio backend API. Trust model: verification signals, not binary\
    \ verified flags."
  version: v1
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/v1/profile:
    get:
      tags:
      - profile-controller
      operationId: getProfile
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      tags:
      - profile-controller
      operationId: updateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Profile not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/contacts/{id}:
    get:
      tags:
      - contact-controller
      operationId: getContact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      tags:
      - contact-controller
      operationId: updateContact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      tags:
      - contact-controller
      operationId: deleteContact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/contacts:
    get:
      tags:
      - contact-controller
      operationId: listContacts
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactListResponse"
        "400":
          description: Invalid cursor
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Profile not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags:
      - contact-controller
      operationId: createContact
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Profile not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/auth/sessions:
    post:
      tags:
      - auth-controller
      operationId: createSession
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Invalid or expired token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/auth/magic-links:
    post:
      tags:
      - auth-controller
      operationId: requestMagicLink
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagicLinkRequest"
        required: true
      responses:
        "202":
          description: Accepted — same response whether or not the account exists
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Rate limited
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /docs:
    get:
      tags:
      - api-docs-ui-controller
      operationId: scalarUi
      responses:
        "200":
          description: OK
          content:
            text/html:
              schema:
                type: string
  /api/v1/templates:
    get:
      tags:
      - template-controller
      operationId: listTemplates
      parameters:
      - name: locale
        in: query
        required: false
        schema:
          type: string
          default: en
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TemplateListResponse"
        "400":
          description: Unsupported locale
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/templates/{id}:
    get:
      tags:
      - template-controller
      operationId: getTemplate
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TemplateResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Template not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/auth/sessions/current:
    get:
      tags:
      - auth-controller
      operationId: currentSession
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      tags:
      - auth-controller
      operationId: logout
      parameters:
      - name: verifolio_session
        in: cookie
        required: false
        schema:
          type: string
      responses:
        "204":
          description: Session revoked (idempotent)
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    ProfileUpdateRequest:
      type: object
      properties:
        displayName:
          type: string
          minLength: 1
        legalName:
          type:
          - string
          - "null"
        preferredLocale:
          type: string
          minLength: 1
      required:
      - displayName
      - preferredLocale
    ApiError:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties:
            type: string
        requestId:
          type:
          - string
          - "null"
    ProfileResponse:
      type: object
      properties:
        profileId:
          type: string
        displayName:
          type: string
        legalName:
          type:
          - string
          - "null"
        preferredLocale:
          type: string
        profileVerificationStatus:
          type: string
    ContactRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
          minLength: 1
        companyName:
          type:
          - string
          - "null"
        companyDomain:
          type:
          - string
          - "null"
        title:
          type:
          - string
          - "null"
        relationshipType:
          type: string
          minLength: 1
      required:
      - email
      - name
      - relationshipType
    ContactResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        companyName:
          type:
          - string
          - "null"
        companyDomain:
          type:
          - string
          - "null"
        title:
          type:
          - string
          - "null"
        relationshipType:
          type: string
        createdAt:
          type: string
        updatedAt:
          type:
          - string
          - "null"
    SessionRequest:
      type: object
      properties:
        token:
          type: string
          minLength: 1
      required:
      - token
    CurrentUserResponse:
      type: object
      properties:
        userId:
          type: string
        email:
          type: string
        region:
          type: string
    MagicLinkRequest:
      type: object
      properties:
        email:
          type: string
          minLength: 1
      required:
      - email
    MessageResponse:
      type: object
      properties:
        message:
          type: string
    TemplateListItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        locale:
          type: string
        name:
          type: string
        description:
          type: string
    TemplateListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TemplateListItem"
    TemplateResponse:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        locale:
          type: string
        name:
          type: string
        description:
          type: string
        questionSchema: {}
        outputSchema: {}
        requiredFields: {}
        verificationRecommendations: {}
    ContactListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ContactResponse"
        nextCursor:
          type:
          - string
          - "null"
