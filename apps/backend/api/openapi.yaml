openapi: 3.1.0
info:
  title: Verifolio API
  description: "Verifolio backend API. Trust model: verification signals, not binary\
    \ verified flags."
  version: v1
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/v1/recommender/response-draft:
    put:
      tags:
      - recommender-flow-controller
      operationId: saveDraft
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DraftDto"
        "401":
          description: No active recommender session
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Not a recommender session or missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Consent not accepted yet
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/profile:
    get:
      tags:
      - profile-controller
      operationId: getProfile
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      tags:
      - profile-controller
      operationId: updateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/contacts/{id}:
    get:
      tags:
      - contact-controller
      operationId: getContact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      tags:
      - contact-controller
      operationId: updateContact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      tags:
      - contact-controller
      operationId: deleteContact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/reference-requests:
    get:
      tags:
      - reference-request-controller
      operationId: listReferenceRequests
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: status
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReferenceRequestListResponse"
        "400":
          description: Invalid cursor or status filter
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags:
      - reference-request-controller
      operationId: createReferenceRequest
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReferenceRequestRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReferenceRequestResponse"
        "400":
          description: Validation failed or verbal-consent attestation missing
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/reference-requests/{id}/send:
    post:
      tags:
      - reference-request-controller
      operationId: sendReferenceRequest
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReferenceRequestResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Reference request or contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: "Not in CREATED status, expired, or attestation missing"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Recommender email rate limit exceeded
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/reference-requests/{id}/request-correction:
    post:
      tags:
      - reference-request-controller
      operationId: requestCorrection
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestCorrectionRequest"
      responses:
        "200":
          description: Correction requested; recommender re-invited
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReferenceRequestResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Reference request not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Not in NEEDS_REVIEW
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/reference-requests/{id}/cancel:
    post:
      tags:
      - reference-request-controller
      operationId: cancelReferenceRequest
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReferenceRequestResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Reference request not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Request is already in a terminal status
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/reference-requests/{id}/accept:
    post:
      tags:
      - reference-request-controller
      operationId: acceptResponse
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Response accepted; document generated and locked
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AcceptResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Reference request not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Not in NEEDS_REVIEW or no submitted response
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/recommender/responses:
    post:
      tags:
      - recommender-flow-controller
      operationId: submit
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitResponseRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RecommenderStatusResponse"
        "400":
          description: Missing confirmations or letter text
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: No active recommender session
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Not a recommender session or missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Wrong status or consent missing
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/recommender/consent:
    post:
      tags:
      - recommender-flow-controller
      operationId: consent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsentDecisionRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RecommenderStatusResponse"
        "401":
          description: No active recommender session
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Not a recommender session or missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Consent gate already passed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/invitations/{token}/report-abuse:
    post:
      tags:
      - invitation-controller
      operationId: reportAbuse
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
        "404":
          description: Invitation not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Request already terminal
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/invitations/{token}/email-confirmations:
    post:
      tags:
      - invitation-controller
      operationId: requestEmailConfirmation
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      responses:
        "202":
          description: Accepted
        "404":
          description: Invitation not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many codes requested
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/invitations/{token}/decline:
    post:
      tags:
      - invitation-controller
      operationId: decline
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
        "404":
          description: Invitation not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Request already terminal
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/invitations/{token}/confirm-email:
    post:
      tags:
      - invitation-controller
      operationId: confirmEmail
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmEmailRequest"
        required: true
      responses:
        "200":
          description: Recommender session cookie set
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ConfirmEmailResponse"
        "400":
          description: Invalid or expired code
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Invitation not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/contacts:
    get:
      tags:
      - contact-controller
      operationId: listContacts
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactListResponse"
        "400":
          description: Invalid cursor
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Profile not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags:
      - contact-controller
      operationId: createContact
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Profile not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/auth/sessions:
    post:
      tags:
      - auth-controller
      operationId: createSession
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Invalid or expired token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/auth/magic-links:
    post:
      tags:
      - auth-controller
      operationId: requestMagicLink
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagicLinkRequest"
        required: true
      responses:
        "202":
          description: Accepted — same response whether or not the account exists
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Rate limited
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /docs:
    get:
      tags:
      - api-docs-ui-controller
      operationId: scalarUi
      responses:
        "200":
          description: OK
          content:
            text/html:
              schema:
                type: string
  /api/v1/templates:
    get:
      tags:
      - template-controller
      operationId: listTemplates
      parameters:
      - name: locale
        in: query
        required: false
        schema:
          type: string
          default: en
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TemplateListResponse"
        "400":
          description: Unsupported locale
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/templates/{id}:
    get:
      tags:
      - template-controller
      operationId: getTemplate
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/TemplateResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Template not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/reference-requests/{id}:
    get:
      tags:
      - reference-request-controller
      operationId: getReferenceRequest
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReferenceRequestResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Reference request not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/recommender/request:
    get:
      tags:
      - recommender-flow-controller
      operationId: requestContext
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RecommenderRequestContext"
        "401":
          description: No active recommender session
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Not a recommender session
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Request no longer active
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/invitations/{token}:
    get:
      tags:
      - invitation-controller
      operationId: openInvitation
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/InvitationPreviewResponse"
        "404":
          description: "Invitation unknown, expired, consumed, or request terminal"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/documents:
    get:
      tags:
      - document-controller
      operationId: listDocuments
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DocumentListResponse"
        "400":
          description: Invalid cursor
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/documents/{id}:
    get:
      tags:
      - document-controller
      operationId: getDocument
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DocumentDetailResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Document not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/documents/{id}/versions/{versionNumber}/download-url:
    get:
      tags:
      - document-controller
      operationId: downloadUrl
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: versionNumber
        in: path
        required: true
        schema:
          type: integer
          format: int32
      responses:
        "200":
          description: Short-lived presigned download link
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DownloadLinkResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Document or version not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/auth/sessions/current:
    get:
      tags:
      - auth-controller
      operationId: currentSession
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      tags:
      - auth-controller
      operationId: logout
      parameters:
      - name: verifolio_session
        in: cookie
        required: false
        schema:
          type: string
      responses:
        "204":
          description: Session revoked (idempotent)
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    DraftRequest:
      type: object
      properties:
        answersJson:
          type:
          - object
          - "null"
          additionalProperties: {}
        approvedLetterText:
