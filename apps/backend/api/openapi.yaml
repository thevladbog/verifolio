openapi: 3.1.0
info:
  title: Verifolio API
  description: "Verifolio backend API. Trust model: verification signals, not binary\
    \ verified flags."
  version: v1
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/v1/recommender/response-draft:
    put:
      tags:
      - recommender-flow-controller
      operationId: saveDraft
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DraftRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DraftDto"
        "401":
          description: No active recommender session
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Not a recommender session or missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Consent not accepted yet
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/profile:
    get:
      tags:
      - profile-controller
      operationId: getProfile
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      tags:
      - profile-controller
      operationId: updateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdateRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/contacts/{id}:
    get:
      tags:
      - contact-controller
      operationId: getContact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    put:
      tags:
      - contact-controller
      operationId: updateContact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ContactResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      tags:
      - contact-controller
      operationId: deleteContact
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "204":
          description: No Content
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/share-links/{id}/revoke:
    post:
      tags:
      - share-link-controller
      operationId: revokeShareLink
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Public access stops immediately
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ShareLinkResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Share link not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Already revoked
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/reference-requests:
    get:
      tags:
      - reference-request-controller
      operationId: listReferenceRequests
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      - name: status
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReferenceRequestListResponse"
        "400":
          description: Invalid cursor or status filter
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags:
      - reference-request-controller
      operationId: createReferenceRequest
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReferenceRequestRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReferenceRequestResponse"
        "400":
          description: Validation failed or verbal-consent attestation missing
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/reference-requests/{id}/send:
    post:
      tags:
      - reference-request-controller
      operationId: sendReferenceRequest
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReferenceRequestResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Reference request or contact not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: "Not in CREATED status, expired, or attestation missing"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Recommender email rate limit exceeded
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/reference-requests/{id}/request-correction:
    post:
      tags:
      - reference-request-controller
      operationId: requestCorrection
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestCorrectionRequest"
      responses:
        "200":
          description: Correction requested; recommender re-invited
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReferenceRequestResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Reference request not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Not in NEEDS_REVIEW
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/reference-requests/{id}/cancel:
    post:
      tags:
      - reference-request-controller
      operationId: cancelReferenceRequest
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReferenceRequestResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Reference request not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Request is already in a terminal status
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/reference-requests/{id}/accept:
    post:
      tags:
      - reference-request-controller
      operationId: acceptResponse
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: Response accepted; document generated and locked
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/AcceptResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Reference request not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Not in NEEDS_REVIEW or no submitted response
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/recommender/uploads:
    get:
      tags:
      - recommender-flow-controller
      operationId: listUploads
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UploadListResponse"
        "401":
          description: No active recommender session
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Not a recommender session
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags:
      - recommender-flow-controller
      operationId: createUpload
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUploadRequest"
        required: true
      responses:
        "201":
          description: Constrained presigned PUT URL for direct upload
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UploadCreatedResponse"
        "400":
          description: "Validation failed (type, size, MIME)"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: No active recommender session
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Not a recommender session or missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: "Wrong status, upload cap, or invalid signature target"
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/recommender/uploads/{id}/confirm:
    post:
      tags:
      - recommender-flow-controller
      operationId: confirmUpload
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: READY or REJECTED with the reason
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ConfirmUploadResponse"
        "401":
          description: No active recommender session
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Not a recommender session or missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Upload not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Upload is not awaiting confirmation
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/recommender/responses:
    post:
      tags:
      - recommender-flow-controller
      operationId: submit
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitResponseRequest"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RecommenderStatusResponse"
        "400":
          description: Missing confirmations or letter text
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: No active recommender session
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Not a recommender session or missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Wrong status or consent missing
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/recommender/consent:
    post:
      tags:
      - recommender-flow-controller
      operationId: consent
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConsentDecisionRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RecommenderStatusResponse"
        "401":
          description: No active recommender session
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Not a recommender session or missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Consent gate already passed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/privacy/recommender-requests:
    post:
      tags:
      - recommender-dsr-controller
      operationId: intake
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommenderDataRequestRequest"
        required: true
      responses:
        "202":
          description: Accepted (no match/enumeration signal is leaked)
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/privacy/recommender-requests/{id}/verify:
    post:
      tags:
      - recommender-dsr-controller
      operationId: verify
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecommenderDsrVerifyRequest"
        required: true
      responses:
        "200":
          description: Code accepted; consent withdrawal executed or request recorded
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/RecommenderDsrVerifyResponse"
        "400":
          description: Invalid or expired code
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Request not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Request already verified or terminal
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/privacy/data-subject-requests:
    get:
      tags:
      - data-subject-request-controller
      operationId: list
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DataSubjectRequestListResponse"
        "400":
          description: Invalid cursor
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags:
      - data-subject-request-controller
      operationId: submit_1
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDataSubjectRequestRequest"
        required: true
      responses:
        "201":
          description: Request received (RECEIVED)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DataSubjectRequestResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Type not applicable to the account-holder channel (e.g. consent
            withdrawal)
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/invitations/{token}/stop-reminders:
    post:
      tags:
      - invitation-controller
      operationId: stopReminders
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: Reminders stopped (idempotent)
        "404":
          description: Invitation not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/invitations/{token}/report-abuse:
    post:
      tags:
      - invitation-controller
      operationId: reportAbuse
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
        "404":
          description: Invitation not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Request already terminal
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/invitations/{token}/email-confirmations:
    post:
      tags:
      - invitation-controller
      operationId: requestEmailConfirmation
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      responses:
        "202":
          description: Accepted
        "404":
          description: Invitation not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many codes requested
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/invitations/{token}/decline:
    post:
      tags:
      - invitation-controller
      operationId: decline
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeclineRequest"
      responses:
        "200":
          description: OK
        "404":
          description: Invitation not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Request already terminal
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/invitations/{token}/confirm-email:
    post:
      tags:
      - invitation-controller
      operationId: confirmEmail
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmEmailRequest"
        required: true
      responses:
        "200":
          description: Recommender session cookie set
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ConfirmEmailResponse"
        "400":
          description: Invalid or expired code
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Invitation not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/documents/{id}/share-links:
    get:
      tags:
      - share-link-controller
      operationId: listShareLinks
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ShareLinkListResponse"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Document not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
    post:
      tags:
      - share-link-controller
      operationId: createShareLink
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShareLinkRequest"
      responses:
        "201":
          description: The response contains the raw link URL exactly once
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ShareLinkCreatedResponse"
        "400":
          description: Validation failed
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Missing CSRF token
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: Document not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Document has no locked version
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/contacts:
    get:
      tags:
      - contact-controller
      operationId: listContacts
      parameters:
      - name: cursor
        in: query
        required: false
        schema:
          type: string
      responses:
