spring:
  application:
    name: verifolio-backend
  jooq:
    sql-dialect: postgres
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/verifolio}
    username: ${DB_USERNAME:verifolio}
    password: ${DB_PASSWORD:verifolio}
    hikari:
      # REQUIRES_NEW audit writes borrow a second connection while the caller holds one;
      # safe concurrent logins ≈ pool/2. Event-driven audit (AFTER_COMMIT) is the long-term fix.
      maximum-pool-size: 20
  flyway:
    enabled: true
  mail:
    host: localhost
    port: 1025
    properties:
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000

springdoc:
  api-docs:
    version: openapi_3_1

verifolio:
  region: local # development-only value, see docs/REGION_POLICIES.md
  docs-ui-enabled: true # serves Scalar from a public CDN — keep disabled in production until self-hosted
  auth:
    token-pepper: local-dev-pepper-change-me # DEV ONLY — must be overridden outside the local region
    magic-link-ttl: 15m
    session-ttl: 30d
    frontend-base-url: http://localhost:3000
    cookie-secure: false # local dev over plain http; MUST be true in any deployed environment
    recommender-session-ttl: 1h
    email-confirmation-ttl: 10m
    email-confirmation-limit: 3 # code issues per invitation per window
    email-confirmation-window: 15m
  mail:
    from: no-reply@verifolio.local
  consents:
    requester-attestation:
      text-id: local-requester-attestation # region policy consent text id; overridden per cell (docs/REGION_POLICIES.md)
      version: 1
    processing:
      text-id: local-processing # 152-FZ RU / GDPR EU / GLOBAL text per cell (docs/REGION_POLICIES.md)
      version: 1
    cross-border-transfer:
      text-id: local-cross-border
      version: 1
    public-sharing:
      text-id: local-public-sharing # per-upload sharing consent (docs/RECOMMENDER_EXPERIENCE.md)
      version: 1
  requests:
    expiry: 21d
    send-limit-per-recommender: 5 # global anti-spam limit across all requesters (docs/RECOMMENDER_EXPERIENCE.md)
    send-limit-window: 1d
  storage:
    endpoint: http://localhost:9000 # MinIO from docker-compose; per-cell S3 endpoint in production
    region-name: local
    bucket: verifolio-local
    access-key: minioadmin # DEV ONLY
    secret-key: minioadmin # DEV ONLY
    presigned-ttl: 5m
    path-style: true # required for MinIO; disable for AWS-style virtual-host buckets
    max-upload-bytes: 15728640 # 15 MB per recommender upload
    upload-url-ttl: 10m
  public-page:
    view-audit-sample-rate: 1.0 # production cells tune this down; downloads are always fully audited
  verification:
    free-email-domains: # deny-list for CORPORATE_DOMAIN_CONFIRMED (docs/VERIFICATION_SIGNALS.md)
      - gmail.com
      - googlemail.com
      - yahoo.com
      - hotmail.com
      - outlook.com
      - mail.ru
      - yandex.ru
      - icloud.com
      - proton.me
      - protonmail.com
