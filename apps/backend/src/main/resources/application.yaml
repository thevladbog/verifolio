spring:
  application:
    name: verifolio-backend
  jooq:
    sql-dialect: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/verifolio
    username: verifolio
    password: verifolio
    hikari:
      # REQUIRES_NEW audit writes borrow a second connection while the caller holds one;
      # safe concurrent logins ≈ pool/2. Event-driven audit (AFTER_COMMIT) is the long-term fix.
      maximum-pool-size: 20
  flyway:
    enabled: true
  mail:
    host: localhost
    port: 1025

springdoc:
  api-docs:
    version: openapi_3_1

verifolio:
  region: local # development-only value, see docs/REGION_POLICIES.md
  auth:
    token-pepper: local-dev-pepper-change-me
    magic-link-ttl: 15m
    session-ttl: 30d
    frontend-base-url: http://localhost:3000
  mail:
    from: no-reply@verifolio.local
