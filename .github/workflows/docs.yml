name: Docs CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: |
            **/*.md
            !node_modules

  link-check:
    name: Internal link check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run lychee (offline, internal links only)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress "**/*.md"
          fail: true
          failIfEmpty: false
