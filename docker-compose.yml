# local-dev defaults; override via .env
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: verifolio
      POSTGRES_USER: verifolio
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-verifolio}
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: verifolio
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-verifolio-local}
    ports: ["9000:9000", "9001:9001"]
    volumes: [miniodata:/data]

  mailpit:
    image: axllent/mailpit:latest
    ports: ["1025:1025", "8025:8025"]

  temporal:
    image: temporalio/auto-setup:latest
    depends_on: [postgres]
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: verifolio
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-verifolio}
      POSTGRES_SEEDS: postgres
    ports: ["7233:7233"]

  frontend:
    build: apps/frontend
    environment:
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-http://host.docker.internal:8080}
      NEXT_PUBLIC_REGION: local
    ports: ["3000:3000"]
    extra_hosts: ["host.docker.internal:host-gateway"]

  temporal-ui:
    image: temporalio/ui:latest
    depends_on: [temporal]
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    ports: ["8088:8080"]

volumes:
  pgdata:
  miniodata:
